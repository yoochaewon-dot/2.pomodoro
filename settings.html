<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Settings</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <main class="settings-card">
    <h3>Setting</h3>

    <div class="setting-item">
      <label for="timer-minutes">타이머 시간 (분)</label>
      <input type="number" id="timer-minutes" name="timer-minutes" value="25" min="1" max="60" oninput="updateSaveButtonState()" />
    </div>

    <button type="button" id="save-button" onclick="saveSettings()">저장</button>
    <button type="button" onclick="location.href='index.html'">메인 페이지로 돌아가기</button>
  </main>

  <script src="settings.js"></script>
</body>
</html>
